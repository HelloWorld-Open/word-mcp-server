name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

jobs:
  test:
    runs-on: windows-2022
    strategy:
      matrix:
        node-version: [18, 20, 22]
    env:
      GYP_MSVS_VERSION: 2022

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Check build tools
        continue-on-error: true
        shell: pwsh
        run: |
          $vs = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath 2>$null
          if ($vs) { Write-Output "VS found: $vs" } else { Write-Output "WARNING: VS not found" }
          $py = (Get-Command python -ErrorAction SilentlyContinue).Source
          if ($py) { Write-Output "Python: $py" } else { Write-Output "WARNING: Python not found" }

      - name: Install dependencies (skip native build)
        run: npm ci --ignore-scripts

      - name: Build native module (winax)
        shell: pwsh
        run: |
          $nodeArch = if ([Environment]::Is64BitProcess) { "x64" } else { "x86" }
          npx node-gyp rebuild --directory=node_modules/winax --arch=$nodeArch

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npx vitest run --exclude 'tests/integration/**'

  publish:
    needs: test
    if: github.event_name == 'release'
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
